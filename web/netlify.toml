[build]
  command = "npm run build"
  publish = "dist"

# Edge: `netlify/edge-functions/landing-seo-inject.ts` injicerer `landing_seo` fra Supabase
# i det HTML crawlers får, så og:image (upload) virker i link-forhåndsvisning.
# Kræver VITE_SUPABASE_URL og VITE_SUPABASE_ANON_KEY (eller SUPABASE_*) i Netlify
# "Environment variables" — også for Edge runtime, ikke kun build.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
