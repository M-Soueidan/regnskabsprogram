name: Invoice automation reminders

# Daglig kørsel kl. 07:00 Europe/Copenhagen.
# GitHub Actions cron kører i UTC; juster tilsvarende efter sommer-/vintertid hvis behov.
# Sommertid (CEST = UTC+2): 05:00 UTC. Vintertid (CET = UTC+1): 06:00 UTC.
# Vi bruger 05:00 UTC året rundt — afsendelsestidspunktet skifter en time når DK skifter tid,
# men det har ingen praktisk betydning for daglige påmindelser.
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: invoice-automation-reminders
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Supabase Edge Function
        env:
          CRON_SECRET: ${{ secrets.INVOICE_AUTOMATION_CRON_SECRET }}
        run: |
          set -euo pipefail
          response=$(curl -sS -o /tmp/body.json -w '%{http_code}' \
            -X POST \
            -H "x-bilago-invoice-automation: ${CRON_SECRET}" \
            https://vfswagwhjshjnmppptif.supabase.co/functions/v1/invoice-automation-reminders)
          echo "HTTP ${response}"
          cat /tmp/body.json
          echo
          if [ "${response}" != "200" ]; then
            echo "Edge function returned non-2xx" >&2
            exit 1
          fi
